<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AnthiaX AI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #120846;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
      margin: 0;
    }

    /* 🔥 WRAPPER FOR CENTERING */
    #chatWrapper {
      flex: 1;
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    /* CHAT CONTAINER */
    #chat {
      width: 100%;
      max-width: 900px;
      overflow-y: auto;
      padding: 40px 20px 20px 20px;
      display: flex;
      flex-direction: column;
    }

    /* MESSAGE BUBBLES */
    .message {
      margin-bottom: 15px;
      max-width: 70%;
      padding: 12px 14px;
      border-radius: 12px;
      display: inline-block;
      width: fit-content;
      word-wrap: break-word;
      line-height: 1.4;
    }

    /* USER MESSAGE */
    .user {
      background: #2563eb;
      align-self: flex-end;
    }

    /* AI MESSAGE */
    .ai {
      background: rgba(255, 255, 255, 0.06);
      align-self: flex-start;
      backdrop-filter: blur(6px);
    }

    /* INPUT AREA */
    #inputArea {
      position: sticky;
      bottom: 0;
      display: flex;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(to top, #020617, transparent);
    }

    /* INNER INPUT CONTAINER */
    #inputInner {
      width: 100%;
      max-width: 900px;
      display: flex;
      gap: 10px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.05);
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1); /* ✅ subtle default border */
      outline: none;
      background: #020617;
      color: white;
      transition: border 0.2s ease, box-shadow 0.2s ease; /* 🔥 smooth interaction */
    }

    input::placeholder {
      color: #94a3b8;
    }

    /* 🔥 ADDED: Premium focus state */
    input:focus {
      border: 1px solid #b01ce6;
      box-shadow: 0 0 0 2px rgba(176, 28, 230, 0.2);
    }

    /* SEND BUTTON */
    button {
      padding: 10px 16px;
      background: #b01ce6;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      color: white;
    }

    button:hover {
      opacity: 0.9;
    }

    #clearBtn {
      background: #374151;
    }

    #clearBtn:hover {
      background: #4b5563;
    }

    /* TYPING INDICATOR */
    .typing {
      display: flex;
      gap: 5px;
    }

    .typing span {
      width: 6px;
      height: 6px;
      background: #94a3b8;
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0);
      }
      40% {
        transform: scale(1);
      }
    }

  </style>
</head>

<body>

  <div id="chatWrapper">
    <div id="chat"></div>
  </div>

  <div id="inputArea">
    <div id="inputInner">
      <input id="userInput" placeholder="Ask AnthiaX something..." />
      <button onclick="sendMessage()">Send</button>
      <button onclick="clearChat()" id="clearBtn">Clear</button>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById('userInput');
      const chat = document.getElementById('chat');
      const message = input.value;

      if (!message) return;

      const userDiv = document.createElement('div');
      userDiv.className = 'message user';
      userDiv.innerText = message;
      chat.appendChild(userDiv);

      input.value = "";

      const typingDiv = document.createElement('div');
      typingDiv.className = 'message ai';
      typingDiv.id = 'typing';

      typingDiv.innerHTML = `
        <div class="typing">
          <span></span>
          <span></span>
          <span></span>
        </div>
      `;

      chat.appendChild(typingDiv);
      chat.scrollTop = chat.scrollHeight;

      const response = await fetch('https://anthiax-ai-api-frcfd6h0grd5bmae.uksouth-01.azurewebsites.net/api/anthiax-agent-api', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });

      const data = await response.json();

      document.getElementById('typing')?.remove();

      const aiDiv = document.createElement('div');
      aiDiv.className = 'message ai';

      aiDiv.innerHTML = data.message
        .replace(/\n/g, "<br>")
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/### (.*?)(<br>|$)/g, "<strong>$1</strong><br>");

      chat.appendChild(aiDiv);
      chat.scrollTop = chat.scrollHeight;
    }

    function clearChat() {
      const confirmed = confirm("Clear the conversation?");
      if (!confirmed) return;
      document.getElementById('chat').innerHTML = "";
    }
  </script>

</body>
</html>
