<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- 🔥 FIXED: moved into correct place -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>AnthiaX AI</title>

  <style>
    body {
  font-family: Arial, sans-serif;

  /* 🔥 base colour */
  background-color: #f5f6f8;

  /* 🔥 dot pattern */
  background-image: radial-gradient(#d1d5db 1px, transparent 1px);

  /* spacing between dots */
  background-size: 20px 20px;

  color: #111827;

  display: flex;
  flex-direction: column;
  height: 100vh;
  margin: 0;
    }

    /* 🔥 NEW: OUTER CONTAINER TO FIX WIDTH ILLUSION */
    #chatContainer {
      width: 100%;
      max-width: 900px;
      margin: 40px auto;

      display: flex;
      flex-direction: column;

      background: #f5f6f8;

      /* 🔥 THIS fixes your issue */
      border: 1px solid #e5e7eb;
      border-radius: 12px;

      /* 🔥 premium SaaS depth */
      box-shadow:
        0 10px 30px rgba(0,0,0,0.08),
        0 1px 2px rgba(0,0,0,0.05);

      overflow: hidden;

      /* 🔥 Fixed Height Logic */
      min-height: calc(100vh - 80px);

      /* 🔥 NEW: ensures proper full-height behaviour */
      height: calc(100vh - 80px);
    }

    /* CHAT CONTAINER */
    #chat {
      flex: 1;

      /* 🔥 KEY CHANGE: no forced height, but prevents collapse */
      min-height: 150px;

      overflow-y: auto;

      /* ✅ FIXED spacing */
      padding: 30px 20px 20px 20px;

      /* ✅ REQUIRED for alignment */
      display: flex;
      flex-direction: column;

      /* 🔥 NEW: ensures chat starts from bottom without breaking scroll */
      position: relative;

      /* 🔥 IMPORTANT: remove background conflict */
      background: transparent;
    }

    /* 🔥 NEW: only push content down when chat is empty */
    #chat:empty::before {
      content: "";
      flex: 1;
    }

    /* 🔥 NEW: robust empty-state fix (JS controlled) */
    #chat.empty::before {
      content: "";
      flex: 1;
    }

    /* MESSAGE BUBBLES */
    .message {
      margin-bottom: 15px;
      max-width: 70%;
      padding: 12px;
      border-radius: 10px;

      /* ✅ FIXED dynamic sizing */
      display: inline-block;
      width: fit-content;

      word-wrap: break-word;
    }

    /* USER MESSAGE */
    .user {
      background: #b01ce6;
      color: white;
      align-self: flex-end;
    }

    /* AI MESSAGE */
    .ai {
      background: white;
      color: #111827;
      border: 1px solid #e5e7eb;
      align-self: flex-start;
    }

    /* INPUT AREA */
    #inputArea {
      display: flex;
      padding: 16px;

      /* 🔥 FIXED: now matches container */
      background: white;

      /* 🔥 creates separation */
      border-top: 1px solid #e5e7eb;

      /* 🔥 ADDED: cleaner spacing between elements */
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;

      /* 🔥 upgraded input styling */
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      color: #111827;

      margin-right: 10px;
      outline: none;
    }

    /* 🔥 ADDED: focus state */
    input:focus {
      border-color: #b01ce6;
      box-shadow: 0 0 0 2px rgba(176, 28, 230, 0.15);
    }

    input::placeholder {
      color: #9ca3af;
    }

    /* SEND BUTTON */
    button {
      padding: 10px 15px;
      background: #b01ce6;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;

      /* ✅ FIXED text color */
      color: white;
    }

    button:hover {
      opacity: 0.9;
    }

    /* 🔥 ADDED: Clear button styling */
    #clearBtn {
      background: #374151;
      color: white;
    }

    #clearBtn:hover {
      background: #4b5563;
    }

    /* 🔥 ADDED: Typing indicator animation */
    .typing {
      display: flex;
      gap: 5px;
    }

    .typing span {
      width: 6px;
      height: 6px;
      background: #94a3b8;
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0);
      }
      40% {
        transform: scale(1);
      }
    }

    /* 🔥 MOBILE OPTIMISATION (SAFE - DOES NOT AFFECT DESKTOP) */
    @media (max-width: 768px) {

      /* 🔥 NEW: remove pattern from body */
      body {
        height: auto;
        background-image: none;
      }

      /* 🔥 NEW: move dots into chat container */
      #chatContainer {
        margin: 0;
        border-radius: 0;
        max-width: 100%;

        background-color: #f5f6f8;
        background-image: radial-gradient(#d1d5db 1px, transparent 1px);
        background-size: 20px 20px;

        box-shadow: none;
        border: none;

        /* 🔥 NEW: ensures mobile height behaves properly */
        height: 100vh !important;
      }

      #chat {
        padding: 20px 12px 10px 12px;
      }

      .message {
        max-width: 85%;
        font-size: 14px;
      }

      #inputArea {
        padding: 12px;
        position: sticky;
        bottom: 0;

        /* 🔥 NEW: keeps it above content */
        z-index: 10;
      }

      input {
        font-size: 16px;
        padding: 12px;

        /* 🔥 FIX: allow input to shrink properly */
        min-width: 0;
      }

      button {
        padding: 10px 12px;
        font-size: 14px;
      }
    }

  </style>
</head>

<body>

  <!-- 🔥 NEW: WRAPPED EVERYTHING -->
  <div id="chatContainer">
    <div id="chat"></div>

    <div id="inputArea">
      <input id="userInput" placeholder="Ask AnthiaX something..." />
      <button onclick="sendMessage()">Send</button>

      <!-- 🔥 ADDED: Clear button -->
      <button onclick="clearChat()" id="clearBtn">Clear</button>
    </div>
  </div>

  <script>
    // 🔥 MOBILE PLACEHOLDER FIX
    if (window.innerWidth < 768) {
      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('userInput').placeholder = "Just ask...";
      });
    }

    // 🔥 NEW: handle empty chat state (reliable version)
    function updateChatState() {
      const chat = document.getElementById('chat');

      if (chat.children.length === 0) {
        chat.classList.add('empty');
      } else {
        chat.classList.remove('empty');
      }
    }

    // run on load
    document.addEventListener("DOMContentLoaded", updateChatState);

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const chat = document.getElementById('chat');
      const message = input.value;

      if (!message) return;

      const userDiv = document.createElement('div');
      userDiv.className = 'message user';
      userDiv.innerText = message;
      chat.appendChild(userDiv);

      updateChatState();

      input.value = "";

      const typingDiv = document.createElement('div');
      typingDiv.className = 'message ai';
      typingDiv.id = 'typing';

      typingDiv.innerHTML = `
        <div class="typing">
          <span></span>
          <span></span>
          <span></span>
        </div>
      `;

      chat.appendChild(typingDiv);

      // 🔥 NEW: smart auto-scroll (ChatGPT style)
      let isNearBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 120;
      if (isNearBottom) {
        chat.scrollTop = chat.scrollHeight;
      }

      const response = await fetch('https://anthiax-ai-api-frcfd6h0grd5bmae.uksouth-01.azurewebsites.net/api/anthiax-agent-api', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });

      const data = await response.json();

      document.getElementById('typing')?.remove();

      const aiDiv = document.createElement('div');
      aiDiv.className = 'message ai';

      aiDiv.innerHTML = data.message
        .replace(/\n/g, "<br>")
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/### (.*?)(<br>|$)/g, "<strong>$1</strong><br>");

      chat.appendChild(aiDiv);

      updateChatState();

      // 🔥 NEW: smart auto-scroll again
      isNearBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 120;
      if (isNearBottom) {
        chat.scrollTop = chat.scrollHeight;
      }
    }

    // 🔥 ADDED: Clear chat function with confirmation
    function clearChat() {
      const confirmed = confirm("Clear the conversation?");
      if (!confirmed) return;

      document.getElementById('chat').innerHTML = "";

      updateChatState();
    }

    // 🔥 NEW: MOBILE KEYBOARD FIX (SAFE - DOES NOT BREAK DESKTOP)
    function adjustForKeyboard() {
      const chatContainer = document.getElementById('chatContainer');

      if (window.innerWidth < 768) {
        chatContainer.style.height = window.innerHeight + "px";
      }
    }

    window.addEventListener('resize', adjustForKeyboard);
    window.addEventListener('load', adjustForKeyboard);

  </script>

</body>
</html>
